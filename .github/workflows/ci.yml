name: CI - Build and Test
 
on:
  push:
    branches: [ main, master ]
 
permissions:
  contents: read
  packages: write
 
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Build the Docker image
        run: docker build -t tutorial-app:ci .
 
      - name: Create shared network
        run: docker network create test-net
 
      - name: Start database
        run: |
          docker run -d --name test-db --network test-net \
            -e POSTGRES_USER=tutorial_user \
            -e POSTGRES_PASSWORD=tutorial_password \
            -e POSTGRES_DB=tutorial_db \
            postgres:15-alpine
 
      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            docker exec test-db pg_isready -U tutorial_user && break
            sleep 2
          done
 
      - name: Run the app
        run: |
          docker run -d --name test-app --network test-net \
            -e DB_HOST=test-db -e DB_USER=tutorial_user \
            -e DB_PASSWORD=tutorial_password -e DB_NAME=tutorial_db \
            -p 8080:8080 tutorial-app:ci
 
      - name: Wait and health check
        run: |
          sleep 15
          curl --fail http://localhost:8080/api/tutorials || exit 1
 
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build tag and push image to GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker tag tutorial-app:ci $IMAGE:latest
          docker push $IMAGE:latest

      - name: Publish image to GHCR
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker tag tutorial-app:ci $IMAGE:latest
          docker push $IMAGE:latest
